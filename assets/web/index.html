<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sketchnote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; overflow: hidden; }
  #sketch { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  #status { position: fixed; bottom: 8px; right: 12px; font-family: monospace; font-size: 11px; color: #555; }
</style>
</head>
<body>
<img id="sketch" alt="Live Sketchnote">
<div id="status">connecting…</div>
<script>
(function() {
  const img = document.getElementById('sketch');
  const status = document.getElementById('status');
  let ws, reconnectDelay = 2000;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.binaryType = 'blob';

    ws.onopen = () => {
      status.textContent = 'live';
      reconnectDelay = 2000;
    };

    ws.onmessage = (evt) => {
      if (evt.data instanceof Blob) {
        const prev = img.src;
        img.src = URL.createObjectURL(evt.data);
        // Revoke previous object URL to free memory.
        if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);
      }
    };

    ws.onclose = () => {
      status.textContent = `reconnecting in ${reconnectDelay / 1000}s…`;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => ws.close();
  }

  connect();
})();
</script>
</body>
</html>
