<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sketchnote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; overflow: hidden; position: relative; }
  #sketch { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

  /* Questions panel — bottom-right, slides up */
  #q-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
    z-index: 10;
  }
  .q-card {
    background: rgba(10, 10, 10, 0.88);
    border: 1px solid rgba(255,255,255,0.12);
    border-left: 3px solid #4a90d9;
    border-radius: 10px;
    padding: 12px 14px;
    backdrop-filter: blur(6px);
    animation: slideIn 0.35s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #4a90d9;
    margin-bottom: 5px;
  }
  .q-text { font-size: 14px; color: #f0f0f0; line-height: 1.4; }
  .q-asker { font-size: 11px; color: #888; margin-top: 6px; }

  #status { position: fixed; bottom: 8px; left: 12px; font-family: monospace; font-size: 11px; color: #444; }
</style>
</head>
<body>
<img id="sketch" alt="Live Sketchnote">
<div id="q-panel"></div>
<div id="status">connecting…</div>

<script>
(function() {
  const img = document.getElementById('sketch');
  const status = document.getElementById('status');
  const panel = document.getElementById('q-panel');
  let ws, reconnectDelay = 2000;

  const MAX_VISIBLE = 3;   // show at most 3 question cards at once
  const CARD_TTL = 12000;  // auto-dismiss after 12s

  function addQuestion(q) {
    const card = document.createElement('div');
    card.className = 'q-card';

    const label = document.createElement('div');
    label.className = 'q-label';
    label.textContent = 'Audience question';

    const text = document.createElement('div');
    text.className = 'q-text';
    text.textContent = q.text;

    card.appendChild(label);
    card.appendChild(text);

    if (q.asker) {
      const asker = document.createElement('div');
      asker.className = 'q-asker';
      asker.textContent = q.asker;
      card.appendChild(asker);
    }

    panel.appendChild(card);

    // Remove oldest card if too many visible.
    while (panel.children.length > MAX_VISIBLE) {
      panel.removeChild(panel.firstChild);
    }

    // Auto-dismiss.
    setTimeout(() => {
      if (card.parentNode === panel) panel.removeChild(card);
    }, CARD_TTL);
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.binaryType = 'blob';

    ws.onopen = () => {
      status.textContent = 'live';
      reconnectDelay = 2000;
    };

    ws.onmessage = (evt) => {
      if (evt.data instanceof Blob) {
        // PNG frame — update sketchnote image.
        const prev = img.src;
        img.src = URL.createObjectURL(evt.data);
        if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);
      } else {
        // JSON event — handle question notifications.
        try {
          const ev = JSON.parse(evt.data);
          if (ev.type === 'question') addQuestion(ev);
        } catch {}
      }
    };

    ws.onclose = () => {
      status.textContent = `reconnecting in ${reconnectDelay / 1000}s…`;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => ws.close();
  }

  connect();
})();
</script>
</body>
</html>
