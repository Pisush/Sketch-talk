services:
  sketch-talk:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    volumes:
      - ./output:/output
      - ./slides:/slides
    command: >
      run
      --title "${TALK_TITLE:-My Talk}"
      --speaker "${SPEAKER_NAME:-Speaker}"
      --handle "${SPEAKER_HANDLE:-}"
      --conference "${CONFERENCE_NAME:-Conference}"
      --hashtag "${CONFERENCE_TAG:-#conf}"
      --slides /slides/demo.pdf
      --output /output/sketchnote.png
